<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Control de Stock | Suministros Hospitalarios</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<!-- SheetJS (exportación a Excel) -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<!-- Firebase (SDK compat, para uso directo con <script> sin módulos/build) -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-storage-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-analytics-compat.js"></script>

<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: contain; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 999px; }

  .chip-scroll::-webkit-scrollbar { display: none; }
  .chip-scroll { -ms-overflow-style: none; scrollbar-width: none; }

  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes slideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
  @keyframes popIn { from { opacity:0; transform: scale(.95) translateY(8px);} to { opacity:1; transform: scale(1) translateY(0);} }
  @keyframes popOut { from { opacity:1; transform: scale(1) translateY(0);} to { opacity:0; transform: scale(.95) translateY(8px);} }
  @keyframes toastIn { from { opacity:0; transform: translate(-50%, 12px);} to { opacity:1; transform: translate(-50%, 0);} }
  @keyframes cardIn { from { opacity:0; transform: translateY(10px) scale(.97);} to { opacity:1; transform: translateY(0) scale(1);} }
  @keyframes imgPop { from { opacity:0; transform: scale(.92);} to { opacity:1; transform: scale(1);} }
  @keyframes spinSlow { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }

  .anim-slide-up { animation: slideUp .28s cubic-bezier(.32,.72,0,1); }
  .anim-slide-down { animation: slideDown .22s cubic-bezier(.32,.72,0,1) forwards; }
  .anim-fade-in { animation: fadeIn .18s ease-out; }
  .anim-fade-out { animation: fadeOut .18s ease-in forwards; }
  .anim-pop-in { animation: popIn .18s cubic-bezier(.22,1,.36,1); }
  .anim-pop-out { animation: popOut .16s ease-in forwards; }
  .anim-toast { animation: toastIn .25s ease-out; }
  .anim-card-in { animation: cardIn .32s cubic-bezier(.22,1,.36,1) both; }
  .anim-img-pop { animation: imgPop .25s cubic-bezier(.22,1,.36,1); }

  .card-tap { transition: transform .15s ease, box-shadow .15s ease; }
  .card-tap:active { transform: scale(0.97); }
  .card-tap:hover { box-shadow: 0 6px 20px -6px rgba(15,23,42,.15); }

  input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.6; }
</style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen pb-24">

<!-- ============================================================
     HEADER
============================================================ -->
<header class="sticky top-0 z-30 bg-teal-800 text-white shadow-md">
  <div class="px-4 pt-4 pb-3 flex items-center justify-between">
    <div>
      <h1 class="text-lg font-bold leading-tight">Control de Stock</h1>
      <p class="text-teal-200 text-xs">Suministros Hospitalarios</p>
    </div>
    <button onclick="exportStock()" class="flex items-center gap-1.5 bg-teal-700/70 hover:bg-teal-700 active:scale-95 transition rounded-xl px-3 py-2 text-xs font-semibold">
      <i data-lucide="file-down" class="w-4 h-4"></i>
      Exportar
    </button>
  </div>

  <!-- Selector de bloques y Pedido -->
  <div class="px-4 pb-3 flex flex-wrap items-center gap-2">
    <button id="blockSelectorBtn" onclick="toggleBlockSelector()" class="inline-flex items-center gap-2 bg-white text-slate-700 rounded-full px-4 py-2 shadow-sm border border-slate-200 hover:bg-slate-50 active:scale-90 transition">
      <i data-lucide="layers" class="w-4 h-4"></i>
      <span class="text-sm font-semibold">Bloques</span>
    </button>
    <button id="orderBtn" onclick="toggleOrderPanel()" class="inline-flex items-center gap-2 bg-white text-slate-700 rounded-full px-4 py-2 shadow-sm border border-slate-200 hover:bg-slate-50 active:scale-90 transition">
      <i data-lucide="shopping-cart" class="w-4 h-4"></i>
      <span class="text-sm font-semibold">Pedido</span>
    </button>
    <div id="blockSelector" class="mt-3 hidden rounded-3xl bg-white border border-slate-200 p-3 shadow-sm w-full">
      <div id="blockSelectorButtons" class="grid grid-cols-6 gap-2"></div>
    </div>
  </div>

  <!-- Buscador -->
  <div class="px-4 pb-3">
    <div class="relative">
      <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
      <input id="searchInput" type="text" placeholder="Buscar por nombre, descripción o lote..."
        class="w-full bg-white text-slate-800 text-sm rounded-xl pl-9 pr-9 py-2.5 outline-none focus:ring-2 focus:ring-teal-400 placeholder:text-slate-400"
        oninput="onSearchInput()">
      <button id="clearSearchBtn" onclick="clearSearch()" class="hidden absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400">
        <i data-lucide="x-circle" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="px-4 pb-3 flex gap-2 overflow-x-auto chip-scroll">
    <button data-filter="todos" onclick="setFilter('todos')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="bajo" onclick="setFilter('bajo')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="proximo" onclick="setFilter('proximo')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="vencido" onclick="setFilter('vencido')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="fisico" onclick="setFilter('fisico')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="sinStock" onclick="setFilter('sinStock')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="sinStockS" onclick="setFilter('sinStockS')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="sinStockF" onclick="setFilter('sinStockF')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="verificado" onclick="setFilter('verificado')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="sinVerificar" onclick="setFilter('sinVerificar')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
    <button data-filter="prioridad" onclick="setFilter('prioridad')" class="filter-chip whitespace-nowrap text-xs font-semibold px-3 py-1.5 rounded-full transition"></button>
  </div>
</header>

<!-- ============================================================
     CONTENIDO PRINCIPAL
============================================================ -->
<main class="px-4 py-4 max-w-3xl mx-auto">
  <div id="orderPanelWrapper"></div>
  <div id="blockPanelWrapper"></div>
  <div id="resultsCount" class="text-xs text-slate-500 mb-2 font-medium"></div>
  <div id="productList" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
  <div id="emptyState" class="hidden flex-col items-center justify-center text-center py-16">
    <i data-lucide="package-search" class="w-12 h-12 text-slate-300 mb-3"></i>
    <p class="text-slate-500 font-medium">No se encontraron suministros</p>
    <p class="text-slate-400 text-sm mt-1">Prueba con otro término o filtro</p>
  </div>
</main>

<!-- Botón flotante: Agregar Producto -->
<button onclick="openAddProductModal()"
  class="fixed bottom-5 right-5 z-30 bg-teal-600 hover:bg-teal-700 active:scale-95 transition text-white rounded-full shadow-lg shadow-teal-900/30 px-5 py-3.5 flex items-center gap-2 font-semibold text-sm">
  <i data-lucide="plus" class="w-5 h-5"></i>
  Agregar Producto
</button>

<!-- ============================================================
     MODAL: DETALLE / EDICIÓN DE PRODUCTO
============================================================ -->
<div id="detailModal" class="hidden fixed inset-0 z-40">
  <div class="absolute inset-0 bg-black/40 anim-fade-in" onclick="closeDetailModalWithSound()"></div>
  <div class="absolute inset-x-0 bottom-0 top-8 bg-slate-50 rounded-t-3xl anim-slide-up flex flex-col overflow-hidden">

      </button>

    <!-- Body (scrollable) -->

      </div>
      <div class="bg-white rounded-2xl p-4 border border-slate-200 space-y-3">
        <div>
          <label class="text-xs font-semibold text-slate-500">Nombre del suministro</label>
          <input id="editNombre" type="text" class="mt-1 w-full text-sm rounded-xl border border-slate-200 px-3 py-2.5 outline-none focus:ring-2 focus:ring-teal-400">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500">Descripción</label>
          <input id="editDescripcion" type="text" class="mt-1 w-full text-sm rounded-xl border border-slate-200 px-3 py-2.5 outline-none focus:ring-2 focus:ring-teal-400">
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between mb-2">
          <h3 class="text-sm font-bold text-slate-700">Lotes registrados</h3>
          <button onclick="openAddLoteModal()" class="flex items-center gap-1 text-xs font-semibold text-teal-700 bg-teal-50 px-2.5 py-1.5 rounded-lg active:scale-95 transition">
            <i data-lucide="plus" class="w-3.5 h-3.5"></i> Agregar Lote
          </button>
        </div>
        <p class="text-[11px] text-amber-600 font-semibold mb-2 flex items-center gap-1">

        </p>
        <div id="lotesContainer" class="space-y-3"></div>
      </div>
    </div>

    <!-- Footer -->
    <div class="px-4 py-3 border-t border-slate-200 bg-white shrink-0">
      <button onclick="saveProductChanges()" class="w-full bg-teal-600 hover:bg-teal-700 active:scale-[.98] transition text-white font-semibold text-sm rounded-xl py-3 flex items-center justify-center gap-2">
        <i data-lucide="check" class="w-4 h-4"></i> Guardar Cambios
      </button>
    </div>
  </div>
</div>

<!-- ============================================================
     MODAL: AGREGAR PRODUCTO NUEVO
============================================================ -->

  <div class="relative w-full sm:max-w-md bg-white rounded-t-3xl sm:rounded-3xl anim-slide-up sm:anim-pop-in max-h-[90vh] overflow-y-auto">
    <div class="px-4 pt-4 pb-2 flex items-center justify-between sticky top-0 bg-white">

      <div>
        <label class="text-xs font-semibold text-slate-500">Descripción</label>

      <div class="pt-2 border-t border-slate-100">

        </div>
        <div>
          <label class="text-xs font-bold text-amber-600 flex items-center gap-1"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i>Cantidad F</label>
          <input id="newLoteCantidadF" type="number" min="0" placeholder="0" class="mt-1 w-full text-sm rounded-xl border border-amber-200 bg-amber-50/70 px-3 py-2.5 outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500">Cantidad *</label>
          <input id="newLoteCantidad" type="number" min="0" placeholder="0" class="mt-1 w-full text-sm rounded-xl border border-slate-200 px-3 py-2.5 outline-none focus:ring-2 focus:ring-teal-400">
        </div>
        <div>
          <label class="text-xs font-bold text-amber-600 flex items-center gap-1"><i data-lucide="map-pin" class="w-3.5 h-3.5"></i>Fecha física</label>

  </div>
</div>

<!-- ============================================================
     MODAL: AGREGAR NUEVO LOTE

          <input id="loteCantidadF" type="number" min="0" placeholder="0" class="mt-1 w-full text-sm rounded-xl border border-amber-200 bg-amber-50/70 px-3 py-2.5 outline-none focus:ring-2 focus:ring-amber-400">
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-500">Cantidad *</label>
          <input id="loteCantidad" type="number" min="0" placeholder="0" class="mt-1 w-full text-sm rounded-xl border border-slate-200 px-3 py-2.5 outline-none focus:ring-2 focus:ring-teal-400">

        <div>

        <div>

<script>
/* =====================================================================
   FIREBASE — Inicialización y conexión a Cloud Firestore
   Sustituye el almacenamiento local (localStorage) por persistencia
   en la nube. La app sigue funcionando igual: se lee todo al iniciar
   y se escribe en cada acción del usuario, tal como antes.
===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyALcp6jIRkuRTi7J56BzsNinq8Wdtup600",
  authDomain: "control-stock-55201.firebaseapp.com",
  projectId: "control-stock-55201",
  storageBucket: "control-stock-55201.firebasestorage.app",
  messagingSenderId: "1097151750892",
  appId: "1:1097151750892:web:0bd7b0278d74b6d46bfbc9",
  measurementId: "G-3NMS631VKY"
};

const firebaseApp = firebase.initializeApp(firebaseConfig);
try { firebase.analytics(); } catch (e) { console.warn('Analytics no disponible:', e); }

const db = firebase.firestore();
const storage = firebase.storage();
const productosCol = db.collection('productos');
const bloquesCol = db.collection('bloques');

// Firestore no acepta valores 'undefined' ni instancias no planas;
// esta función limpia el objeto antes de guardarlo.
function sanitizeForFirestore(obj) {
  return JSON.parse(JSON.stringify(obj));
}

// Los códigos de producto se usan como ID de documento; se sanean
// por si contuvieran '/' u otros caracteres no válidos para un docId.
function safeDocId(id) {
  return String(id).replace(/\//g, '_').trim();
}

/* =====================================================================

const BLOCK_IDS = Array.from({ length: 26 }, (_, i) => String.fromCharCode(65 + i));

const CLIENT_ID = `client_${Math.random().toString(36).slice(2, 10)}`;
let state = {
  products: [],
  filter: 'todos',
  search: '',
  currentCode: null,
  selectedBlock: null,
  blockLevelFilter: 'todos',
  blockAddMode: null,
  blockAddProduct: null,
  blockProductSearch: '',
  orderMode: null,
  orderProductSearch: '',
  orderSelectedProduct: null,
  orderSelectedLot: null,
  orderSelectedQuantity: null,
  orderItems: []
};

function normalizeTimestamp(value) {
  if (!value) return 0;
  if (typeof value === 'number') return value;
  if (value && typeof value.toMillis === 'function') return value.toMillis();
  return 0;
}

// Convierte un error de Firebase en un texto corto y legible para mostrar
// en el toast, incluyendo el código real (ej. "permission-denied",
// "unavailable") en vez de un mensaje genérico. Así se puede diagnosticar
// el problema sin tener que abrir la consola del navegador.
function errorSuffix(e) {
  if (!e) return '.';
  const code = e.code || '';
  if (code) return ` (${code}). Revisa la consola para más detalle.`;
  if (e.message) return `: ${e.message}`;
  return '. Revisa tu conexión.';
}

function isDetailModalOpen() {
  const modal = document.getElementById('detailModal');
  return modal && !modal.classList.contains('hidden');
}

function captureProductDetailDraft() {
  if (!isDetailModalOpen() || !state.currentCode) return null;
  const currentProduct = state.products.find(x => x.codigo === state.currentCode);
  if (!currentProduct) return null;

  const rows = Array.from(document.querySelectorAll('#lotesContainer [data-lote-id]'));
  return {
    nombre: document.getElementById('editNombre')?.value || currentProduct.nombre,
    descripcion: document.getElementById('editDescripcion')?.value || currentProduct.descripcion || '',
    lotes: rows.map(row => ({
      id: row.dataset.loteId,
      numeroLote: row.querySelector('.lote-numero')?.value.trim() || '',
      loteFisico: row.querySelector('.lote-fisico')?.value.trim() || '',
      cantidadF: Number(row.querySelector('.lote-cantidad-f')?.value) || 0,
      cantidad: Number(row.querySelector('.lote-cantidad')?.value) || 0,
      fechaFisica: row.querySelector('.lote-fecha-fisica')?.value || '',
      precio: Number(row.querySelector('.lote-precio')?.value) || 0,
      fechaVencimiento: row.querySelector('.lote-vencimiento')?.value || ''
    }))
  };
}

function isDraftDirty(product, draft) {
  if (!draft) return false;
  if (draft.nombre !== product.nombre) return true;
  if (draft.descripcion !== (product.descripcion || '')) return true;
  if (draft.lotes.length !== product.lotes.length) return true;
  return draft.lotes.some(d => {
    const lote = product.lotes.find(l => l.id === d.id);
    if (!lote) return true;
    return d.numeroLote !== lote.numeroLote ||
      d.loteFisico !== (lote.loteFisico || '') ||
      d.cantidadF !== Number(lote.cantidadF || 0) ||
      d.cantidad !== Number(lote.cantidad || 0) ||
      d.fechaFisica !== (lote.fechaFisica || '') ||
      d.precio !== Number(lote.precio || 0) ||
      d.fechaVencimiento !== lote.fechaVencimiento;
  });
}

function restoreProductDetailDraft(draft) {
  if (!draft) return;
  document.getElementById('editNombre').value = draft.nombre;
  document.getElementById('editDescripcion').value = draft.descripcion;
  const currentProduct = state.products.find(x => x.codigo === state.currentCode);
  if (!currentProduct) return;
  renderLotesEditor(currentProduct);
  const rows = Array.from(document.querySelectorAll('#lotesContainer [data-lote-id]'));
  rows.forEach(row => {
    const draftLote = draft.lotes.find(l => l.id === row.dataset.loteId);
    if (!draftLote) return;
    row.querySelector('.lote-numero').value = draftLote.numeroLote;
    row.querySelector('.lote-fisico').value = draftLote.loteFisico;
    row.querySelector('.lote-cantidad-f').value = draftLote.cantidadF;
    row.querySelector('.lote-cantidad').value = draftLote.cantidad;
    row.querySelector('.lote-fecha-fisica').value = draftLote.fechaFisica;
    row.querySelector('.lote-precio').value = draftLote.precio;
    row.querySelector('.lote-vencimiento').value = draftLote.fechaVencimiento;
  });
}

function refreshProductDetailIfOpen(codigo) {
  if (state.currentCode !== codigo || !isDetailModalOpen()) return;
  const product = state.products.find(x => x.codigo === codigo);
  if (!product) return;
  const draft = captureProductDetailDraft();
  if (draft && isDraftDirty(product, draft)) {
    showToast('Actualización remota recibida. Tu edición actual se conserva.');
    restoreProductDetailDraft(draft);
    return;
  }

  document.getElementById('detailCodeBadge').textContent = product.codigo;
  document.getElementById('editNombre').value = product.nombre;
  document.getElementById('editDescripcion').value = product.descripcion || '';
  renderProductImage(product);
  renderLotesEditor(product);
}

function initBlocks() {
  return new Promise((resolve) => {
    let firstLoad = true;
    bloquesCol.onSnapshot(async snapshot => {
      if (firstLoad) {
        firstLoad = false;
        const byId = {};
        snapshot.forEach(doc => { byId[doc.id] = doc.data(); });
        state.blocks = BLOCK_IDS.map(id => byId[id] ? { id, items: byId[id].items || [], updatedAt: normalizeTimestamp(byId[id].updatedAt) } : { id, items: [] });

        // Si faltan bloques en Firestore (primera vez que corre la app), los crea.
        const missing = BLOCK_IDS.filter(id => !byId[id]);
        if (missing.length > 0) {
          try {
            const batch = db.batch();
            missing.forEach(id => batch.set(bloquesCol.doc(id), { id, items: [], updatedAt: Date.now() }));
            await batch.commit();
          } catch (e) {
            console.error('Error al inicializar bloques en Firestore:', e);
            showToast('No se pudieron crear los bloques' + errorSuffix(e));
          }
        }
        resolve();
      } else {
        handleBlocksSnapshot(snapshot);
      }
    }, error => {
      console.error('Error al cargar bloques desde Firestore:', error);
      showToast('No se pudieron cargar los bloques' + errorSuffix(error));
      if (firstLoad) {
        firstLoad = false;
        state.blocks = BLOCK_IDS.map(id => ({ id, items: [] }));
        resolve();
      }
    });
  });
}

async function persistBlocks(blockId) {
  try {
    const block = getBlock(blockId);
    if (!block) return;
    const ref = bloquesCol.doc(blockId);
    await db.runTransaction(async tx => {
      const remoteDoc = await tx.get(ref);
      const remoteUpdatedAt = normalizeTimestamp(remoteDoc.exists ? remoteDoc.data().updatedAt : 0);
      const localUpdatedAt = normalizeTimestamp(block.updatedAt);
      if (remoteDoc.exists && remoteUpdatedAt > localUpdatedAt) {
        throw new Error('conflict-block');
      }
      block.updatedAt = Date.now();
      tx.set(ref, sanitizeForFirestore(block));
    });
  } catch (e) {
    console.error('Error al guardar el bloque en Firestore:', e);
    if (e.message === 'conflict-block') {
      showToast('Conflicto detectado: otro usuario modificó este bloque. Vuelve a abrirlo para sincronizar.');
      return;
    }
    showToast('No se pudo guardar el bloque' + errorSuffix(e));
  }
}

function getBlock(id) {
  return state.blocks.find(b => b.id === id);
}

/* =====================================================================
   REALTIME SYNC (Firestore onSnapshot)
   Nota: los listeners en tiempo real se establecen directamente dentro
   de initData() e initBlocks() (una sola suscripción por colección,
   reutilizada también para la carga inicial). Antes había un .get()
   de toda la colección DENTRO de initData()/initBlocks() y ADEMÁS un
   onSnapshot() por separado en startRealtimeSync() — cada uno lee la
   colección completa, así que cada carga de página costaba el DOBLE
   de lecturas de las necesarias. Ahora es un único listener por
   colección para toda la vida de la página.
===================================================================== */

function handleProductsSnapshot(snapshot) {
  if (!snapshot || !snapshot.docChanges) return;
  let shouldRenderProducts = false;
  snapshot.docChanges().forEach(change => {
    const remoteProduct = change.doc.data();
    remoteProduct.updatedAt = normalizeTimestamp(remoteProduct.updatedAt);
    const existingIndex = state.products.findIndex(p => p.codigo === remoteProduct.codigo);
    if (change.type === 'removed') {
      if (existingIndex !== -1) {
        state.products.splice(existingIndex, 1);
        shouldRenderProducts = true;
        if (state.currentCode === remoteProduct.codigo && isDetailModalOpen()) {
          showToast('Este medicamento fue eliminado desde otro dispositivo.');
        }
      }
      return;
    }

    if (existingIndex !== -1) {
      const localProduct = state.products[existingIndex];
      const localUpdatedAt = normalizeTimestamp(localProduct.updatedAt);
      if (remoteProduct.updatedAt <= localUpdatedAt) return;
      state.products[existingIndex] = remoteProduct;
      refreshProductDetailIfOpen(remoteProduct.codigo);
      shouldRenderProducts = true;
    } else {
      state.products.push(remoteProduct);
      shouldRenderProducts = true;
    }
  });

  if (shouldRenderProducts) {
    renderProductList();
  }
}

function handleBlocksSnapshot(snapshot) {
  if (!snapshot || !snapshot.docChanges) return;
  let blockChanged = false;
  snapshot.docChanges().forEach(change => {
    const remoteBlock = change.doc.data();
    const existingIndex = state.blocks.findIndex(b => b.id === remoteBlock.id);
    if (existingIndex !== -1) {
      const localBlock = state.blocks[existingIndex];
      const localUpdatedAt = normalizeTimestamp(localBlock.updatedAt);
      const remoteUpdatedAt = normalizeTimestamp(remoteBlock.updatedAt);
      if (remoteUpdatedAt <= localUpdatedAt) return;
      state.blocks[existingIndex] = remoteBlock;
      blockChanged = true;
    } else {
      state.blocks.push(remoteBlock);
      blockChanged = true;
    }
  });

  if (blockChanged) {
    refreshBlockPanelIfOpen();
  }
}

function getBlockItemsHTML() {
  const block = getBlock(state.selectedBlock);
  if (!block) return '';
  const sanitizedFilter = state.blockLevelFilter;
  const filteredItems = (block.items || []).filter(item => sanitizedFilter === 'todos' || item.nivel === Number(sanitizedFilter));
  if (filteredItems.length === 0) {
    return `<div class="rounded-3xl border border-dashed border-slate-200 bg-slate-50 p-6 text-center text-slate-500">
         <p class="font-semibold mb-1">Este bloque está vacío</p>
         <p class="text-xs">Agrega insumos y asígnalos a un nivel.</p>
       </div>`;

/* =====================================================================
   PERSISTENCIA (Cloud Firestore)
===================================================================== */
function initData() {
  return new Promise((resolve) => {
    let firstLoad = true;
    productosCol.onSnapshot(async snapshot => {
      if (firstLoad) {
        firstLoad = false;
        if (!snapshot.empty) {
          state.products = snapshot.docs.map(doc => {
            const data = doc.data();
            data.updatedAt = normalizeTimestamp(data.updatedAt);
            return data;
          });
        } else {
          // Firestore vacío (primera vez): siembra con el inventario base.
          state.products = INVENTARIO_PERSONALIZADO.length > 0 ? INVENTARIO_PERSONALIZADO : buildMockData();
          try {
            await seedProductsToFirestore(state.products);
          } catch (e) {
            console.error('Error al inicializar productos en Firestore:', e);
            showToast('No se pudo inicializar el inventario en la nube' + errorSuffix(e));
          }
        }
        resolve();
      } else {
        handleProductsSnapshot(snapshot);
      }
    }, error => {
      console.error('Error al cargar productos desde Firestore:', error);
      showToast('No se pudieron cargar los datos de la nube' + errorSuffix(error));
      if (firstLoad) {
        firstLoad = false;
        state.products = INVENTARIO_PERSONALIZADO.length > 0 ? INVENTARIO_PERSONALIZADO : buildMockData();
        resolve();
      }
    });
  }).then(() => initBlocks());
}

// Escribe el inventario completo en Firestore (usado solo la primera vez,
// cuando la colección 'productos' está vacía). Firestore permite hasta
// 500 operaciones por batch, así que se divide en tandas.
async function seedProductsToFirestore(products) {
  const chunkSize = 450;
  for (let i = 0; i < products.length; i += chunkSize) {
    const chunk = products.slice(i, i + chunkSize);
    const batch = db.batch();
    chunk.forEach(p => batch.set(productosCol.doc(safeDocId(p.codigo)), sanitizeForFirestore(p)));
    await batch.commit();
  }
}

// Guarda (crea o actualiza) un único producto en Firestore.
async function persist(codigo) {
  try {
    const p = state.products.find(x => x.codigo === codigo);
    if (!p) return;
    const ref = productosCol.doc(safeDocId(codigo));
    await db.runTransaction(async tx => {
      const remoteDoc = await tx.get(ref);
      const remoteUpdatedAt = normalizeTimestamp(remoteDoc.exists ? remoteDoc.data().updatedAt : 0);
      const localUpdatedAt = normalizeTimestamp(p.updatedAt);
      if (remoteDoc.exists && remoteUpdatedAt > localUpdatedAt) {
        throw new Error('conflict-product');
      }
      p.updatedAt = Date.now();
      tx.set(ref, sanitizeForFirestore(p));
    });
  } catch (e) {
    console.error('Error al guardar el producto en Firestore:', e);
    if (e.message === 'conflict-product') {
      showToast('Conflicto detectado: otro usuario actualizó este suministro primero. Vuelve a abrirlo para sincronizar.');
      return;
    }
    showToast('No se pudo guardar en la nube' + errorSuffix(e));
  }
}

// Elimina un producto de Firestore (usado al borrar un suministro completo).
async function deleteProductFromFirestore(codigo) {
  try {
    const ref = productosCol.doc(safeDocId(codigo));
    await db.runTransaction(async tx => {
      const remoteDoc = await tx.get(ref);
      const remoteUpdatedAt = normalizeTimestamp(remoteDoc.exists ? remoteDoc.data().updatedAt : 0);
      const localProduct = state.products.find(x => x.codigo === codigo);
      const localUpdatedAt = normalizeTimestamp(localProduct?.updatedAt);
      if (remoteDoc.exists && remoteUpdatedAt > localUpdatedAt) {
        throw new Error('conflict-product-delete');
      }
      tx.delete(ref);
    });
  } catch (e) {
    console.error('Error al eliminar el producto en Firestore:', e);
    if (e.message === 'conflict-product-delete') {
      showToast('No se pudo eliminar: el suministro fue actualizado desde otro dispositivo. Sincroniza antes de eliminar.');
      return;
    }
    showToast('No se pudo eliminar en la nube' + errorSuffix(e));
  }
}

/* =====================================================================
   UTILIDAD DE MIGRACIÓN ÚNICA (uso manual desde la consola)
   Si en el navegador donde usabas la versión anterior (con localStorage)
   tenías datos guardados, ejecuta esto UNA sola vez en la consola de ese
   navegador para subirlos a Firestore, ANTES de que otro dispositivo
   siembre la base de datos con el inventario base:

     window.importarRespaldoLocalAFirestore()

   Esto lee 'hospitalStockData_v1' y 'hospitalStockBlocks_v1' de
   localStorage (si existen en ese navegador) y los sube a Firestore.
===================================================================== */
window.importarRespaldoLocalAFirestore = async function () {
  const rawProductos = localStorage.getItem('hospitalStockData_v1');
  const rawBloques = localStorage.getItem('hospitalStockBlocks_v1');

  if (!rawProductos && !rawBloques) {
    console.warn('No se encontró ningún respaldo en localStorage en este navegador.');
    return;
  }

  if (rawProductos) {
    try {
      const productos = JSON.parse(rawProductos);
      await seedProductsToFirestore(productos);
      console.log(`✅ ${productos.length} productos subidos a Firestore.`);
    } catch (e) {
      console.error('Error al subir productos del respaldo local:', e);
    }
  }

  if (rawBloques) {
    try {
      const bloques = JSON.parse(rawBloques);
      const batch = db.batch();
      bloques.forEach(b => batch.set(bloquesCol.doc(b.id), b));
      await batch.commit();
      console.log(`✅ ${bloques.length} bloques subidos a Firestore.`);
    } catch (e) {
      console.error('Error al subir bloques del respaldo local:', e);
    }
  }

  console.log('Migración completa. Recarga la página para ver los datos desde Firestore.');
};

/* =====================================================================
   UTILIDADES DE NEGOCIO
===================================================================== */
function generateId(prefix) {
  return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
}

function getTotalStock(product) {
  return product.lotes.reduce((sum, l) => sum + Number(l.cantidad || 0), 0);
}

function daysUntil(fechaISO) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const venc = new Date(fechaISO + 'T00:00:00');
  return Math.ceil((venc - today) / 86400000);
}

function getLoteStatus(lote) {
  const d = daysUntil(lote.fechaVencimiento);
  if (d < 0) return 'vencido';
  if (d <= EXPIRY_WARNING_DAYS) return 'proximo';
  return 'ok';
}

function getProductFlags(product) {
  const total = getTotalStock(product);
  const physicalTotal = product.lotes.reduce((sum, l) => sum + Number(l.cantidadF || 0), 0);
  return {
    total,
    physicalTotal,
    hasVencido: product.lotes.some(l => getLoteStatus(l) === 'vencido'),
    hasProximo: product.lotes.some(l => getLoteStatus(l) === 'proximo'),
    // counts for badges
    expiredCount: product.lotes.reduce((c, l) => c + (getLoteStatus(l) === 'vencido' ? 1 : 0), 0),
    physicalHigherCount: product.lotes.reduce((c, l) => c + (Number(l.cantidadF || 0) > Number(l.cantidad || 0) ? 1 : 0), 0),
    physicalLowerCount: product.lotes.reduce((c, l) => c + (Number(l.cantidadF || 0) < Number(l.cantidad || 0) ? 1 : 0), 0),
    wideMismatch: product.lotes.some(l => Number(l.cantidadF || 0) !== Number(l.cantidad || 0)),
    lowStock: total < LOW_STOCK_THRESHOLD,
    noStockSystem: total === 0,
    noStockPhysical: physicalTotal === 0,
    noStockBoth: total === 0 && physicalTotal === 0,
    verificado: !!product.verificado
  };
}

function formatDate(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function formatMoney(n) {
  return Number(n || 0).toLocaleString('es-DO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

/* =====================================================================
   SONIDOS (WebAudio)
===================================================================== */
function initSounds() {
  try {
    window._ac = new (window.AudioContext || window.webkitAudioContext)();
  } catch (e) {
    window._ac = null;
  }
  window._suppressClickSound = false;
}

function playTone(freq = 440, duration = 0.08, type = 'sine') {
  if (!window._ac) return;
  const o = window._ac.createOscillator();
  const g = window._ac.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.value = 0.0001;
  o.connect(g);
  g.connect(window._ac.destination);
  const now = window._ac.currentTime;
  g.gain.exponentialRampToValueAtTime(0.2, now + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, now + duration);
  o.start(now);
  o.stop(now + duration + 0.02);
}

function playClick() { playTone(1000, 0.05, 'square'); }
function playOpen() { playTone(660, 0.12, 'sine'); }
function playClose() { playTone(220, 0.14, 'sine'); }
function playPositive() { playTone(880, 0.14, 'sine'); }
function playNegative() { playTone(220, 0.18, 'sawtooth'); }

function playSound(name) {
  if (!window._ac) initSounds();
  // when non-click sounds are played programmatically, suppress the next global click sound
  if (['open','close','positive','negative','action'].includes(name)) window._suppressClickSound = true;
  switch(name) {
    case 'click': return playClick();
    case 'open': return playOpen();
    case 'close': return playClose();
    case 'positive': return playPositive();
    case 'negative': return playNegative();
    case 'action': return playTone(520, 0.12, 'triangle');
    default: return playClick();
  }
}

// Attach a global click handler to play click sounds for button interactions,
// but skip one if suppressed by a programmatic sound call.
document.addEventListener('click', (e) => {
  const btn = e.target.closest && e.target.closest('button');
  if (!btn) return;
  if (window._suppressClickSound) { window._suppressClickSound = false; return; }
  playSound('click');
});

/* =====================================================================
   ANIMACIÓN GENÉRICA DE CIERRE DE MODALES
   Reutilizable por cualquier modal con la estructura:
   <div id="modalId"><div class="overlay">...</div><div class="panel">...</div></div>
   Anima el overlay (fade-out) y el panel (slide-down o pop-out según
   cuál animación de entrada tenga) antes de ocultar el modal.
===================================================================== */
function animateModalClose(modalId, duration = 220) {
  const modal = document.getElementById(modalId);
  if (!modal) return;
  const overlay = modal.querySelector(':scope > div:first-child');
  const panel = modal.querySelector(':scope > div:last-child');
  const usesPop = panel && panel.classList.contains('anim-pop-in');

  if (overlay) overlay.classList.add('anim-fade-out');
  if (panel) panel.classList.add(usesPop ? 'anim-pop-out' : 'anim-slide-down');

  setTimeout(() => {
    modal.classList.add('hidden');
    if (overlay) overlay.classList.remove('anim-fade-out');
    if (panel) panel.classList.remove('anim-slide-down', 'anim-pop-out');
  }, duration);
}

  const blob = new Blob([generateOrderText(targetItems)], { type: 'text/plain;charset=utf-8' });

async function completeOrder() {
  if (!state.orderItems.length) {
    showToast('No hay productos en el pedido para completar');
    return;
  }
  const insufficient = state.orderItems.find(item => {
    const product = state.products.find(p => p.codigo === item.productCode);
    const lote = product ? product.lotes.find(l => l.id === item.loteId) : null;
    return !product || !lote || Number(lote.cantidad || 0) < Number(item.cantidadAprobada || 0);
  });
  if (insufficient) {
    showToast('Hay un lote con stock insuficiente. Verifica el pedido antes de completar.');
    return;
  }

  const updatedProducts = new Set();
  for (const item of state.orderItems) {
    const product = state.products.find(p => p.codigo === item.productCode);
    if (!product) continue;
    const lote = product.lotes.find(l => l.id === item.loteId);
    if (!lote) continue;
    lote.cantidad = Math.max(0, Number(lote.cantidad || 0) - Number(item.cantidadAprobada || 0));
    updatedProducts.add(product.codigo);
  }

  // Mismo número de lecturas/escrituras que antes (una por producto distinto
  // en el pedido, ya deduplicado arriba); solo se ejecutan en paralelo en vez
  // de una por una, para que "Completar pedido" sea más rápido.
  await Promise.all([...updatedProducts].map(codigo => persist(codigo)));

  const orderItemsCopy = state.orderItems.map(item => ({ ...item }));
  downloadOrderDocument(orderItemsCopy);
  shareOrderByWhatsApp(orderItemsCopy);
  state.orderItems = [];
  state.orderSelectedProduct = null;
  state.orderSelectedLot = null;
  state.orderSelectedQuantity = null;
  renderOrderPanel();
  showToast('Pedido completado y stock actualizado');
}

  state.orderProductSearch = value;

}

function updateOrderProductSearch(value) {
  state.orderProductSearch = value;
  const availableOrderProducts = document.getElementById('availableOrderProducts');
  if (availableOrderProducts) {
    availableOrderProducts.innerHTML = getAvailableOrderProductsHTML();
  }
}

function selectOrderProduct(codigo) {
  state.orderSelectedProduct = codigo;
  state.orderSelectedLot = null;
  state.orderSelectedQuantity = null;
  renderOrderPanel();
}

function setOrderSelectedLot(loteId) {
  state.orderSelectedLot = loteId || null;
  const product = state.products.find(p => p.codigo === state.orderSelectedProduct);
  const lote = product ? product.lotes.find(l => l.id === state.orderSelectedLot) : null;
  state.orderSelectedQuantity = lote ? 1 : null;
  renderOrderPanel();
}

function setOrderSelectedQuantity(value) {
  state.orderSelectedQuantity = value ? Number(value) : null;
}

function addOrderItem(loteId) {
  if (!state.orderSelectedProduct) {
    showToast('Selecciona primero un medicamento');
    return;
  }
  const selectedLotId = loteId || state.orderSelectedLot;
  if (!selectedLotId) {
    showToast('Selecciona un lote antes de agregar');
    return;
  }
  const quantity = Number(state.orderSelectedQuantity || 0);
  if (!quantity || quantity <= 0) {
    showToast('Ingresa la cantidad aprobada');
    return;
  }
  const product = state.products.find(p => p.codigo === state.orderSelectedProduct);
  if (!product) return;
  const lote = product.lotes.find(l => l.id === selectedLotId);
  if (!lote) {
    showToast('No se encontró el lote seleccionado');
    return;
  }
  const available = Number(lote.cantidad || 0);
  if (quantity > available) {
    showToast('La cantidad aprobada no puede ser mayor al stock disponible');
    return;
  }
  if (state.orderItems.some(item => item.productCode === product.codigo && item.loteId === selectedLotId)) {
    showToast('Este lote ya está en el pedido');
    return;
  }
  state.orderItems.push({
    productCode: product.codigo,
    codigo: product.codigo,
    nombre: product.nombre,
    descripcion: product.descripcion || '',
    loteId: lote.id,
    loteNumero: lote.numeroLote,
    fecha: lote.fechaVencimiento || '',
    cantidadAprobada: quantity
  });
  renderOrderPanel();
  showToast(`Lote ${lote.numeroLote} agregado al pedido`);
}

function updateOrderItemQuantity(index, value) {
  const item = state.orderItems[index];
  if (!item) return;
  item.cantidadAprobada = Number(value) || 0;
}

function removeOrderItem(index) {
  state.orderItems.splice(index, 1);
  renderOrderPanel();
}

function getFilteredProducts() {
  const q = state.search.trim().toLowerCase();

  return state.products.filter(p => {
    // Filtro de búsqueda
    if (q) {
      const matchesText = p.nombre.toLowerCase().includes(q) ||
        (p.descripcion || '').toLowerCase().includes(q) ||
        p.codigo.toLowerCase().includes(q) ||
        p.lotes.some(l =>
          l.numeroLote.toLowerCase().includes(q) ||
          (l.loteFisico || '').toLowerCase().includes(q)
        );
      if (!matchesText) return false;
    }

    // Filtro de estado
    if (state.filter === 'todos') return true;
    const flags = getProductFlags(p);
    if (state.filter === 'bajo') return flags.lowStock;
    if (state.filter === 'proximo') return flags.hasProximo;
    if (state.filter === 'vencido') return flags.hasVencido;
    if (state.filter === 'fisico') return flags.wideMismatch;
    if (state.filter === 'sinStock') return flags.noStockBoth;
    if (state.filter === 'sinStockS') return flags.noStockSystem;
    if (state.filter === 'sinStockF') return flags.noStockPhysical;
    if (state.filter === 'verificado') return flags.verificado;
    if (state.filter === 'sinVerificar') return !flags.verificado;
    return true;
  });
}

function badgeHTML(label, colorClasses, icon) {
  return `<span class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-full ${colorClasses}">
    ${icon ? `<i data-lucide="${icon}" class="w-3 h-3"></i>` : ''}${label}
  </span>`;
}

function getProductBlockLocations(codigo) {
  if (!Array.isArray(state.blocks)) return [];
  return state.blocks.flatMap(block => {
    return (block.items || [])
      .filter(item => item.productCode === codigo)
      .map(item => ({ block: block.id, nivel: item.nivel }));
  });
}

function getEarliestVencimiento(product) {
  if (!product || !Array.isArray(product.lotes) || product.lotes.length === 0) return Infinity;
  let min = Infinity;
  product.lotes.forEach(l => {
    if (!l.fechaVencimiento) return;
    const t = new Date(l.fechaVencimiento + 'T00:00:00').getTime();
    if (!isNaN(t) && t < min) min = t;
  });
  return min;
}

function getGlobalEarliestVencimiento() {
  if (!Array.isArray(state.products) || state.products.length === 0) return Infinity;
  let min = Infinity;
  state.products.forEach(p => {
    const v = getEarliestVencimiento(p);
    if (v < min) min = v;
  });
  return min;
}

function toggleProductVerified(event, codigo) {
  if (event) event.stopPropagation();
  const p = state.products.find(x => x.codigo === codigo);
  if (!p) return;
  p.verificado = !p.verificado;
  persist(codigo);

  showToast(p.verificado ? 'Marcado como verificado' : 'Marca de verificado removida');
  renderProductList();
}

function renderProductCard(p, index = 0) {
  const flags = getProductFlags(p);
  let badges = '';
  badges += flags.verificado
    ? `<button type="button" onclick="toggleProductVerified(event, '${p.codigo}')" class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-full bg-emerald-500 text-white active:scale-95 transition"><i data-lucide="check-circle-2" class="w-3 h-3"></i>Verificado</button>`
    : `<button type="button" onclick="toggleProductVerified(event, '${p.codigo}')" class="inline-flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-full bg-slate-100 text-slate-400 border border-dashed border-slate-300 active:scale-95 transition hover:border-emerald-400 hover:text-emerald-500"><i data-lucide="circle" class="w-3 h-3"></i>Verificar</button>`;
  if (flags.hasVencido) badges += badgeHTML('Vencido', 'bg-red-50 text-red-600', 'alert-triangle');
  if (flags.hasProximo) badges += badgeHTML('Por vencer', 'bg-amber-50 text-amber-600', 'clock');
  if (flags.lowStock) badges += badgeHTML('Stock bajo', 'bg-orange-50 text-orange-600', 'trending-down');
  // expired lots count (pink)
  if (flags.expiredCount && flags.expiredCount > 0) badges += badgeHTML(`${flags.expiredCount}`, 'bg-pink-50 text-pink-700');
  // physical higher count (green)
  if (flags.physicalHigherCount && flags.physicalHigherCount > 0) badges += badgeHTML(`${flags.physicalHigherCount}`, 'bg-emerald-50 text-emerald-700');
  // physical lower count (red)
  if (flags.physicalLowerCount && flags.physicalLowerCount > 0) badges += badgeHTML(`${flags.physicalLowerCount}`, 'bg-rose-50 text-rose-700');
  if (flags.wideMismatch) badges += badgeHTML('Fisico distinto', 'bg-emerald-50 text-emerald-700', 'alert-circle');
  badges += badgeHTML(`${p.lotes.length} lote${p.lotes.length !== 1 ? 's' : ''}`, 'bg-slate-100 text-slate-500');
  const physicalTotal = p.lotes.reduce((s, l) => s + Number(l.cantidadF || 0), 0);
  const delay = Math.min(index, 14) * 25;
  const thumb = p.imagenURL
    ? `<img src="${p.imagenURL}" alt="${p.nombre}" loading="lazy" class="w-12 h-12 rounded-xl object-cover border border-slate-200 shrink-0" onerror="this.replaceWith(Object.assign(document.createElement('div'), { className: 'w-12 h-12 rounded-xl bg-slate-100 border border-slate-200 flex items-center justify-center shrink-0', innerHTML: '<i data-lucide=\\'package\\' class=\\'w-5 h-5 text-slate-300\\'></i>' })); lucide.createIcons();">`
    : `<div class="w-12 h-12 rounded-xl bg-slate-100 border border-slate-200 flex items-center justify-center shrink-0"><i data-lucide="package" class="w-5 h-5 text-slate-300"></i></div>`;

  return `
  <div class="anim-card-in card-tap bg-white rounded-2xl shadow-sm border border-slate-200 p-4 cursor-pointer" style="animation-delay:${delay}ms" onclick="openProductDetail('${p.codigo}')">
    <div class="flex justify-between items-start gap-3">
      <div class="flex items-start gap-3 min-w-0">
        ${thumb}
        <div class="min-w-0">
          <p class="text-[11px] font-bold text-teal-700 tracking-wide">${p.codigo}</p>
          <h3 class="font-semibold text-slate-800 text-[15px] leading-tight truncate">${p.nombre}</h3>
          <p class="text-xs text-slate-500 mt-0.5 truncate">${p.descripcion || 'Sin descripción'}</p>
          ${(() => {
            const locations = getProductBlockLocations(p.codigo);
            if (!locations.length) return '';
            const locText = locations.map(loc => `Bloque ${loc.block} · Nivel ${loc.nivel}`).join(' • ');
            return `<p class="text-[11px] text-slate-500 mt-1 truncate">${locText}</p>`;
          })()}
        </div>
      </div>
      <div class="text-right shrink-0">
        <p class="text-lg font-bold text-slate-800">${flags.total}</p>
        <p class="text-[9px] text-slate-400 uppercase tracking-wide">Sistema</p>
        <p class="text-sm font-semibold text-slate-700 mt-1">${physicalTotal}</p>
        <p class="text-[9px] text-slate-400 uppercase tracking-wide">Físico</p>
      </div>
    </div>
    <div class="flex flex-wrap gap-1.5 mt-3">${badges}</div>
  </div>`;
}

function renderProductList() {
  const list = getFilteredProducts();
  const container = document.getElementById('productList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('resultsCount');

  count.textContent = `${list.length} suministro${list.length !== 1 ? 's' : ''} encontrado${list.length !== 1 ? 's' : ''}`;

  if (list.length === 0) {
    container.innerHTML = '';
    empty.classList.remove('hidden');
    empty.classList.add('flex');
  } else {
    empty.classList.add('hidden');
    empty.classList.remove('flex');
    let sortedList = list.slice();
    if (state.filter === 'prioridad') {
      sortedList.sort((a, b) => {
        const ea = getEarliestVencimiento(a);
        const eb = getEarliestVencimiento(b);
        if (ea === eb) return a.nombre.localeCompare(b.nombre);
        if (ea === Infinity) return 1;
        if (eb === Infinity) return -1;
        return ea - eb;
      });
    } else {
      sortedList.sort((a, b) => a.nombre.localeCompare(b.nombre));
    }
    container.innerHTML = sortedList.map((p, i) => renderProductCard(p, i)).join('');
  }
  lucide.createIcons();
}

// Redimensiona y comprime la imagen en el navegador antes de subirla,
// para ahorrar espacio de almacenamiento y datos móviles.
function compressImageFile(file, maxDim = 900, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error('No se pudo leer la imagen'));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('No se pudo procesar la imagen'));
        }, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handleProductImageSelected(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;

  const p = state.products.find(x => x.codigo === state.currentCode);
  if (!p) return;

  renderProductImage(p, true);

  try {
    const blob = await compressImageFile(file);
    const ref = storage.ref().child(`productos/${safeDocId(p.codigo)}.jpg`);
    await ref.put(blob, { contentType: 'image/jpeg' });
    const url = await ref.getDownloadURL();
    p.imagenURL = url;
    await persist(p.codigo);
    renderProductImage(p);
    playSound('positive');
    showToast('Foto guardada');
  } catch (e) {
    console.error('Error al subir la imagen:', e);
    showToast('No se pudo subir la foto' + errorSuffix(e));
    renderProductImage(p);
  }
}

async function removeProductImage(event) {
  event.stopPropagation();
  const p = state.products.find(x => x.codigo === state.currentCode);
  if (!p || !p.imagenURL) return;
  if (!confirm('¿Eliminar la foto de este producto?')) return;

  try {
    await storage.ref().child(`productos/${safeDocId(p.codigo)}.jpg`).delete();
  } catch (e) {
    console.warn('No se pudo borrar el archivo en Storage (puede que ya no exista):', e);
  }

  delete p.imagenURL;
  await persist(p.codigo);
  renderProductImage(p);
  playSound('negative');
  showToast('Foto eliminada');
}

function renderLotesEditor(p) {
  const container = document.getElementById('lotesContainer');
  // calcular la fecha de vencimiento más próxima dentro de este producto
  let minTs = Infinity;
  p.lotes.forEach(l => {
    if (!l.fechaVencimiento) return;
    const t = new Date(l.fechaVencimiento + 'T00:00:00').getTime();
    if (!isNaN(t) && t < minTs) minTs = t;
  });
  // calcular la fecha de vencimiento más próxima global
  const globalMinTs = getGlobalEarliestVencimiento();

  container.innerHTML = p.lotes.map(l => {
    const status = getLoteStatus(l);
    const isPriority = (function() {
      if (!l.fechaVencimiento) return false;
      const t = new Date(l.fechaVencimiento + 'T00:00:00').getTime();
      return !isNaN(t) && t === minTs;
    })();
    const isGlobalPriority = (function() {
      if (!l.fechaVencimiento) return false;
      const t = new Date(l.fechaVencimiento + 'T00:00:00').getTime();
      return !isNaN(t) && t === globalMinTs;
    })();

    const priorityClass = isGlobalPriority ? 'ring-2 ring-rose-300 bg-rose-50/70' : (isPriority ? 'ring-1 ring-yellow-300 bg-yellow-50/60' : '');

    const statusBadge =
      status === 'vencido' ? badgeHTML('Vencido', 'bg-red-50 text-red-600', 'alert-triangle') :
      status === 'proximo' ? badgeHTML('Por vencer', 'bg-amber-50 text-amber-600', 'clock') :
      badgeHTML('Vigente', 'bg-emerald-50 text-emerald-600', 'check');

    return `
    <div class="bg-white rounded-2xl border border-slate-200 p-3.5 ${Number(l.cantidadF || 0) > Number(l.cantidad || 0) ? 'bg-emerald-50/80' : Number(l.cantidadF || 0) < Number(l.cantidad || 0) ? 'bg-rose-50/80' : ''} ${priorityClass}" data-lote-id="${l.id}">
      <div class="flex items-center justify-between mb-2.5">
        <span class="text-xs font-bold text-slate-600">Lote</span>
        <div class="flex items-center gap-2">
          ${statusBadge}
          ${isGlobalPriority ? `<span class="text-[11px] font-bold text-rose-700 bg-rose-100 px-2 py-0.5 rounded-full">Prioridad global</span>` : (isPriority ? `<span class="text-[11px] font-bold text-yellow-700 bg-yellow-100 px-2 py-0.5 rounded-full">Prioridad</span>` : '')}
          <label class="flex items-center gap-1 text-[11px] text-slate-500">
            <input type="checkbox" class="lote-coincide" onchange="toggleLoteCoincide(this)" ${Number(l.cantidadF || 0) === Number(l.cantidad || 0) ? 'checked' : ''}>
            <span>Coincide</span>
          </label>
          <button onclick="deleteLote('${l.id}')" class="text-slate-300 hover:text-red-500 active:scale-90 transition">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-2.5">
        <div class="col-span-2">
          <label class="text-[10px] font-semibold text-slate-400 uppercase">N.º de Lote</label>
          <input type="text" class="lote-numero mt-0.5 w-full text-sm rounded-lg border border-slate-200 px-2.5 py-2 outline-none focus:ring-2 focus:ring-teal-400" value="${l.numeroLote}">
        </div>
        <div>
          <label class="text-[10px] font-bold text-amber-600 uppercase flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>Lote físico</label>
          <input type="text" class="lote-fisico mt-0.5 w-full text-sm rounded-lg border border-amber-200 bg-amber-50/70 px-2.5 py-2 outline-none focus:ring-2 focus:ring-amber-400" value="${l.loteFisico || ''}">
        </div>
        <div>
          <label class="text-[10px] font-bold text-amber-600 uppercase flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>Cantidad F</label>
          <input type="number" min="0" class="lote-cantidad-f mt-0.5 w-full text-sm rounded-lg border border-amber-200 bg-amber-50/70 px-2.5 py-2 outline-none focus:ring-2 focus:ring-amber-400" value="${l.cantidadF || 0}" ${Number(l.cantidadF || 0) === Number(l.cantidad || 0) ? 'disabled' : ''}>
        </div>
        <div>
          <label class="text-[10px] font-semibold text-slate-400 uppercase">Cantidad</label>
          <input type="number" min="0" onchange="syncIfCoincide(this)" class="lote-cantidad mt-0.5 w-full text-sm rounded-lg border border-slate-200 px-2.5 py-2 outline-none focus:ring-2 focus:ring-teal-400" value="${l.cantidad}">
        </div>
        <div>
          <label class="text-[10px] font-bold text-amber-600 uppercase flex items-center gap-1"><i data-lucide="map-pin" class="w-3 h-3"></i>Fecha física</label>
          <input type="date" class="lote-fecha-fisica mt-0.5 w-full text-sm rounded-lg border border-amber-200 bg-amber-50/70 px-2.5 py-2 outline-none focus:ring-2 focus:ring-amber-400" value="${l.fechaFisica || ''}" ${l.fechaFisica === l.fechaVencimiento ? 'disabled' : ''}>
        </div>
        <div>
          <label class="text-[10px] font-semibold text-slate-400 uppercase">Precio (RD$)</label>
          <input type="number" min="0" step="0.01" class="lote-precio mt-0.5 w-full text-sm rounded-lg border border-slate-200 px-2.5 py-2 outline-none focus:ring-2 focus:ring-teal-400" value="${l.precio}">
        </div>
        <div class="col-span-2">
          <label class="text-[10px] font-semibold text-slate-400 uppercase">Vencimiento</label>
          <input type="date" onchange="syncIfCoincide(this)" class="lote-vencimiento mt-0.5 w-full text-sm rounded-lg border border-slate-200 px-2.5 py-2 outline-none focus:ring-2 focus:ring-teal-400" value="${l.fechaVencimiento}">
        </div>
      </div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

function saveProductChanges() {
  const p = state.products.find(x => x.codigo === state.currentCode);
  if (!p) return;

  p.nombre = document.getElementById('editNombre').value.trim() || p.nombre;
  p.descripcion = document.getElementById('editDescripcion').value.trim();

  const rows = document.querySelectorAll('#lotesContainer [data-lote-id]');
  rows.forEach(row => {
    const id = row.dataset.loteId;
    const lote = p.lotes.find(l => l.id === id);
    if (!lote) return;
    lote.numeroLote = row.querySelector('.lote-numero').value.trim() || lote.numeroLote;
    lote.loteFisico = row.querySelector('.lote-fisico').value.trim() || lote.loteFisico || '';
    lote.cantidadF = Number(row.querySelector('.lote-cantidad-f').value) || 0;
    lote.cantidad = Number(row.querySelector('.lote-cantidad').value) || 0;
    lote.fechaFisica = row.querySelector('.lote-fecha-fisica').value || lote.fechaFisica || '';
    lote.precio = Number(row.querySelector('.lote-precio').value) || 0;
    lote.fechaVencimiento = row.querySelector('.lote-vencimiento').value || lote.fechaVencimiento;
  });

  persist(p.codigo);
  renderProductList();
  playSound('positive');
  showToast('Cambios guardados correctamente');
  closeDetailModalWithSound();
}

function deleteLote(loteId) {
  const p = state.products.find(x => x.codigo === state.currentCode);
  if (!p) return;
  if (p.lotes.length <= 1) {
    showToast('No puedes eliminar el único lote. Elimina el producto en su lugar.');
    return;
  }
  if (!confirm('¿Eliminar este lote? Esta acción no se puede deshacer.')) return;
  p.lotes = p.lotes.filter(l => l.id !== loteId);
  persist(p.codigo);
  renderLotesEditor(p);
  renderProductList();
  playSound('negative');
  showToast('Lote eliminado');
}

function requestDeleteProduct() {
  const p = state.products.find(x => x.codigo === state.currentCode);
  if (!p) return;
  if (!confirm(`¿Eliminar por completo "${p.nombre}" (${p.codigo}) y todos sus lotes?`)) return;
  const codigoEliminado = p.codigo;
  state.products = state.products.filter(x => x.codigo !== codigoEliminado);
  deleteProductFromFirestore(codigoEliminado);
  renderProductList();
  playSound('negative');
  showToast('Suministro eliminado');
  closeDetailModalWithSound();
}

      fechaVencimiento: loteVencimiento,

  });

  persist(codigo);
  renderProductList();
  closeAddProductModalWithSound();
  playSound('action');
  showToast(`"${nombre}" agregado correctamente`);
}

/* =====================================================================
   EXPORTAR A EXCEL
===================================================================== */
function toggleLoteCoincide(checkbox) {
  const row = checkbox.closest('[data-lote-id]');
  if (!row) return;
  const isChecked = checkbox.checked;
  const cantidadEl = row.querySelector('.lote-cantidad');
  const cantidadFEl = row.querySelector('.lote-cantidad-f');
  const vencEl = row.querySelector('.lote-vencimiento');
  const fechaFisEl = row.querySelector('.lote-fecha-fisica');
  const cantidad = Number(cantidadEl.value) || 0;
  const fecha = vencEl.value || '';
  if (isChecked) {
    if (cantidadFEl) { cantidadFEl.value = cantidad; cantidadFEl.disabled = true; }
    if (fechaFisEl) { fechaFisEl.value = fecha; fechaFisEl.disabled = true; }
  } else {
    if (cantidadFEl) { cantidadFEl.disabled = false; }
    if (fechaFisEl) { fechaFisEl.disabled = false; }
  }
}

function syncIfCoincide(el) {
  const row = el.closest('[data-lote-id]');
  if (!row) return;
  const coincide = row.querySelector('.lote-coincide');
  if (!coincide || !coincide.checked) return;
  const cantidad = Number(row.querySelector('.lote-cantidad').value) || 0;
  const venc = row.querySelector('.lote-vencimiento').value || '';
  const cantidadFEl = row.querySelector('.lote-cantidad-f');
  const fechaFisEl = row.querySelector('.lote-fecha-fisica');
  if (cantidadFEl) cantidadFEl.value = cantidad;
  if (fechaFisEl) fechaFisEl.value = venc;
}

function exportStock() {
  if (state.products.length === 0) {
    showToast('No hay datos para exportar');
    return;
  }

  const rows = [];
  state.products.forEach(p => {
    const flags = getProductFlags(p);
    p.lotes.forEach(l => {
      const status = getLoteStatus(l);
      rows.push({
        'Código': p.codigo,
        'Producto': p.nombre,
        'Descripción': p.descripcion || '',
        'N.º de Lote': l.numeroLote,
        'Cantidad': l.cantidad,
        'Fecha de Vencimiento': formatDate(l.fechaVencimiento),
        'Precio Unitario (RD$)': l.precio,
        'Estado del Lote': status === 'vencido' ? 'Vencido' : status === 'proximo' ? 'Por vencer' : 'Vigente',
        'Stock Total del Producto': flags.total
      });
    });
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [
    { wch: 10 }, { wch: 24 }, { wch: 28 }, { wch: 12 },
    { wch: 10 }, { wch: 18 }, { wch: 18 }, { wch: 14 }, { wch: 18 }
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Inventario');

  const fecha = new Date().toISOString().split('T')[0];
  XLSX.writeFile(wb, `inventario_hospital_${fecha}.xlsx`);
  showToast('Exportación generada');
}

/* =====================================================================
   TOAST
===================================================================== */
let toastTimer = null;
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.remove('hidden');
  toast.style.left = '50%';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.add('hidden'), 2400);
}

   INICIALIZACIÓN
===================================================================== */
document.addEventListener('DOMContentLoaded', async () => {
  renderFilterChips();
  showLoadingState();
  await initData();
  renderProductList();
  renderBlockSelectorButtons();
  renderBlockPanel();
  renderOrderPanel();
  lucide.createIcons();
});

function showLoadingState() {
  const productList = document.getElementById('productList');
  const emptyState = document.getElementById('emptyState');
  const resultsCount = document.getElementById('resultsCount');
  if (emptyState) { emptyState.classList.add('hidden'); emptyState.classList.remove('flex'); }
  if (resultsCount) resultsCount.textContent = 'Cargando...';
  if (productList) {
    productList.classList.remove('hidden');
    productList.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-16 text-slate-400">
      <i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-3"></i>
      <p class="text-sm font-medium">Cargando inventario desde la nube...</p>
    </div>`;
    lucide.createIcons();
  }
}
